name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint JavaScript and TypeScript
        run: npm run lint:js

      - name: Build assets
        run: npm run build

      - name: Build translation template
        run: npm run i18n

      - name: Validate release package contents
        run: npm run release:prepare
